<div class="post-job-page container">
  <div class="form-card card shadow">
    <h2><i class="fas fa-plus-circle"></i> إضافة فرصة عمل جديدة</h2>
    <p>أدخل تفاصيل الوظيفة لجذب أفضل الخريجين</p>

    <form class="mt-4">
      <div class="form-group">
        <label>المسمى الوظيفي</label>
        <input type="text" class="form-control" placeholder="مثال: Junior Web Developer">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>القسم / التخصص</label>
          <select class="form-control">
            <option>برمجة</option>
            <option>تصميم</option>
            <option>تسويق</option>
            <option>إدارة</option>
          </select>
        </div>
        <div class="form-group">
          <label>نوع العمل</label>
          <select class="form-control">
            <option>دوام كامل</option>
            <option>عن بعد</option>
            <option>تدريب (Internship)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>المهارات المطلوبة</label>
        <textarea class="form-control" rows="3" placeholder="أدخل المهارات وافصل بينها بفاصلة..."></textarea>
      </div>

      <div class="form-group">
        <label>وصف الوظيفة</label>
        <textarea class="form-control" rows="5" placeholder="اكتب تفاصيل الوظيفة والمسؤوليات..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-full">نشر الوظيفة الآن</button>
    </form>
  </div>
</div>
